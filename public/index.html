<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Clipboard - 跨设备剪贴板</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Web Clipboard</h1>
      <p class="subtitle">跨设备剪贴板同步工具</p>
    </header>

    <div id="auth-section" class="section">
      <div class="auth-form">
        <h2>请输入访问密码</h2>
        <input type="password" id="password-input" placeholder="输入密码" autofocus>
        <button id="auth-btn" class="btn btn-primary">确认</button>
        <p id="auth-error" class="error-msg hidden">密码错误，请重试</p>
      </div>
    </div>

    <div id="chat-section" class="section hidden">
      <div class="chat-container">
        <div id="messages-list" class="messages-list"></div>
        
        <div class="input-area">
          <div class="input-row">
            <textarea id="text-input" placeholder="输入文字消息..." rows="1"></textarea>
            <button id="send-text" class="btn btn-primary">发送</button>
            <button id="paste-text" class="btn btn-secondary" title="从剪贴板粘贴">📋</button>
            <label class="btn btn-secondary upload-btn" title="发送图片">
              🖼️
              <input type="file" id="image-input" accept="image/*" multiple hidden>
            </label>
            <label class="btn btn-secondary upload-btn" title="上传文件">
              📎
              <input type="file" id="file-input" multiple hidden>
            </label>
          </div>
          <div class="action-row">
            <span id="image-processing-state" class="processing-state hidden" aria-live="polite">图片处理中...</span>
            <button id="paste-image" class="btn btn-small btn-secondary">粘贴图片</button>
            <button id="clear-all" class="btn btn-small btn-danger">清空全部</button>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <span id="connection-status" class="status connected">已连接</span>
        <span id="expire-info"></span>
        <span id="message-count">0 条消息</span>
        <button id="logout-btn" class="btn btn-small btn-secondary" type="button">退出</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-message">确定要清空所有消息吗？</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn btn-secondary">取消</button>
        <button id="modal-confirm" class="btn btn-danger">确定</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
