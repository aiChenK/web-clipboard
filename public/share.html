<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分享消息 - Web Clipboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="share-page">
    <div class="share-card" id="share-card">
      <div class="share-header">
        <h1>📋 分享消息</h1>
      </div>

      <div id="share-loading" class="share-loading">
        <div class="share-spinner"></div>
        <p>加载中...</p>
      </div>

      <div id="share-error" class="share-error hidden">
        <div class="share-error-icon">❌</div>
        <p id="share-error-message">分享不存在或已过期</p>
        <a href="/" class="btn btn-primary">返回首页</a>
      </div>

      <div id="share-password-section" class="share-password-section hidden">
        <p class="share-password-hint">此分享需要密码访问</p>
        <div class="share-password-form">
          <input type="password" id="share-password-input" placeholder="请输入访问密码" autofocus>
          <button id="share-password-submit" class="btn btn-primary">确认</button>
        </div>
        <p id="share-password-error" class="error-msg hidden">密码错误</p>
      </div>

      <div id="share-content" class="share-content hidden">
        <div class="share-meta">
          <span id="share-time"></span>
          <span id="share-views"></span>
        </div>
        <div id="share-message" class="share-message"></div>
        <div id="share-deleted-notice" class="share-deleted-notice hidden">
          <p>⚠️ 原消息已被删除</p>
        </div>
      </div>

      <div class="share-footer">
        <a href="/" class="share-home-link">Web Clipboard - 跨设备剪贴板</a>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="image-viewer" class="image-viewer hidden">
    <div class="image-viewer-backdrop"></div>
    <div class="image-viewer-content">
      <button class="image-viewer-close" title="关闭">×</button>
      <img id="image-viewer-img" class="image-viewer-img" alt="大图">
      <div class="image-viewer-actions">
        <button id="image-viewer-original" class="btn btn-secondary hidden">查看原图</button>
        <button id="image-viewer-copy" class="btn btn-secondary">复制图片</button>
      </div>
      <p class="image-viewer-hint">点击背景或按 ESC 关闭</p>
    </div>
  </div>

  <script src="/share.js"></script>
</body>
</html>
